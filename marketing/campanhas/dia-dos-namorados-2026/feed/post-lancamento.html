<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; font-family: 'Inter', sans-serif; }

  .slide {
    width: 1080px;
    height: 1350px;
    position: relative;
    overflow: hidden;
  }

  /* Foto de fundo */
  .bg {
    position: absolute;
    inset: 0;
    background: url('../fotos/foto-ambiente.png') center center / cover no-repeat;
  }

  /* Gradiente — sutil no topo, denso na base */
  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(0, 8, 30, 0.30) 0%,
      rgba(0, 8, 30, 0.15) 35%,
      rgba(0, 8, 30, 0.60) 65%,
      rgba(0, 8, 30, 0.92) 100%
    );
  }

  /* Topo: logo + tag */
  .topo {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 48px 64px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 10;
  }
  .logo {
    height: 72px;
    width: auto;
    filter: drop-shadow(0 0 6px rgba(255,255,255,0.9)) drop-shadow(0 0 2px rgba(255,255,255,1));
  }
  .tag {
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    padding: 14px 28px;
    border-radius: 100px;
    background: #F7CF00;
    color: #001DA4;
  }

  /* Conteúdo principal — ancorado na base */
  .conteudo {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 0 72px 80px;
    z-index: 10;
  }

  .eyebrow {
    font-size: 14px;
    font-weight: 800;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: #F7CF00;
    margin-bottom: 24px;
  }

  .titulo {
    font-size: 88px;
    font-weight: 900;
    line-height: 0.95;
    letter-spacing: -0.04em;
    color: #fff;
    margin-bottom: 32px;
  }
  .titulo em {
    font-style: normal;
    color: #F7CF00;
  }

  .divider {
    width: 64px;
    height: 3px;
    background: #F7CF00;
    margin-bottom: 32px;
  }

  .subtexto {
    font-size: 26px;
    font-weight: 500;
    color: rgba(255,255,255,0.80);
    line-height: 1.4;
    margin-bottom: 48px;
  }
  .subtexto strong {
    color: #fff;
    font-weight: 700;
  }

  /* Barra de oferta */
  .oferta-bar {
    display: flex;
    align-items: center;
    gap: 32px;
  }
  .oferta-parcelas {
    font-size: 64px;
    font-weight: 900;
    letter-spacing: -0.04em;
    color: #F7CF00;
    line-height: 1;
  }
  .oferta-detalhe {
    font-size: 20px;
    font-weight: 600;
    color: rgba(255,255,255,0.65);
    line-height: 1.4;
  }
  .oferta-detalhe strong {
    color: #fff;
    display: block;
    font-size: 22px;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="bg"></div>
  <div class="overlay"></div>

  <!-- Topo -->
  <div class="topo">
    <img src="../../../../identidade/logo/logo-completa-trim.png" class="logo" alt="Sr. Colchão Sleep Store">
    <span class="tag">Dia dos Namorados</span>
  </div>

  <!-- Texto -->
  <div class="conteudo">
    <div class="eyebrow">12 de junho · Barretos</div>
    <h1 class="titulo">O presente que<br>os dois usam<br>toda <em>noite.</em></h1>
    <div class="divider"></div>
    <p class="subtexto">Colchão e cama box casal com<br><strong>entrega e montagem grátis.</strong></p>
    <div class="oferta-bar">
      <div class="oferta-parcelas">12x</div>
      <div class="oferta-detalhe">
        <strong>sem juros</strong>
        Vem na loja ou chama no WhatsApp
      </div>
    </div>
  </div>
</div>
</body>
</html>
