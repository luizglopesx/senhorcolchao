<!DOCTYPE html>
<html lang="pt-BR">
<head>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,600;0,700;1,700;1,800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 2560px;
    height: 800px;
    overflow: hidden;
    font-family: 'Montserrat', sans-serif;
  }

  .banner {
    width: 2560px;
    height: 800px;
    position: relative;
    overflow: hidden;
    background: #14171f;
  }

  .bg {
    position: absolute;
    top: 0;
    left: 0;
    width: 2560px;
    height: 800px;
    object-fit: cover;
    z-index: 1;
  }

  /* escurece progressivamente a direita pra texto ficar legivel, sem virar um bloco solido */
  .scrim {
    position: absolute;
    inset: 0;
    z-index: 2;
    background: linear-gradient(90deg,
      rgba(6,10,20,0) 0%,
      rgba(6,10,20,0) 42%,
      rgba(8,12,24,0.58) 60%,
      rgba(6,10,20,0.82) 100%);
  }

  .logo {
    position: absolute;
    top: 56px;
    left: 96px;
    height: 92px;
    z-index: 5;
    filter: drop-shadow(0 2px 10px rgba(0,0,0,0.45));
  }

  .right {
    position: absolute;
    top: 0;
    right: 0;
    width: 1150px;
    height: 100%;
    z-index: 4;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 96px 0 60px;
  }

  .marca {
    font-size: 26px;
    font-weight: 700;
    font-style: italic;
    color: #F7CF00;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 20px;
    opacity: 0.95;
  }

  .headline {
    font-size: 76px;
    font-weight: 800;
    font-style: italic;
    color: #FFFFFF;
    line-height: 1.08;
    letter-spacing: -1px;
    margin-bottom: 8px;
    text-shadow: 0 4px 18px rgba(0,0,0,0.35);
  }
  .headline .amarelo { color: #F7CF00; }

  .sub {
    font-size: 30px;
    font-weight: 600;
    color: #EAF6FD;
    margin-bottom: 30px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.35);
  }

  .produto {
    font-size: 28px;
    font-weight: 600;
    color: #9EEBFF;
    margin-bottom: 4px;
  }

  .preco-linha {
    display: flex;
    align-items: baseline;
    gap: 18px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .preco {
    font-size: 84px;
    font-weight: 800;
    font-style: italic;
    color: #F7CF00;
    line-height: 1;
  }

  .parcelas {
    font-size: 28px;
    font-weight: 600;
    color: #FFFFFF;
  }

  .beneficios {
    display: flex;
    gap: 40px;
    margin-bottom: 38px;
  }

  .beneficio {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .beneficio-icone {
    width: 38px;
    height: 38px;
    background: #F7CF00;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .beneficio-icone svg { width: 20px; height: 20px; fill: #001DA4; }

  .beneficio-texto {
    color: #FFFFFF;
    font-size: 24px;
    font-weight: 600;
  }

  .cta {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    background: #F7CF00;
    color: #001DA4;
    font-size: 30px;
    font-weight: 800;
    font-style: italic;
    padding: 20px 38px;
    border-radius: 12px;
    width: fit-content;
    box-shadow: 0 10px 24px rgba(0,0,0,0.35);
  }
</style>
</head>

</html>
