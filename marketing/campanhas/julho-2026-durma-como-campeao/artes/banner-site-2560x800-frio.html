<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=2560">
<title>Banner Site — Tá frio lá fora (Durma como Campeão / Orthoplus)</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,600;0,700;1,700;1,800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 2560px;
    height: 800px;
    overflow: hidden;
    font-family: 'Montserrat', sans-serif;
  }

  .banner {
    width: 2560px;
    height: 800px;
    position: relative;
    overflow: hidden;
    background: linear-gradient(115deg, #EAF6FD 0%, #EAF6FD 46%, #cfeaf7 54%, #001DA4 62%, #001033 100%);
  }

  /* leve textura de "frio": circulos translúcidos tipo bolhas de vapor/gelo */
  .frost {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.35);
  }
  .frost.f1 { width: 18px; height: 18px; top: 90px; left: 210px; }
  .frost.f2 { width: 10px; height: 10px; top: 160px; left: 300px; opacity: .6;}
  .frost.f3 { width: 26px; height: 26px; top: 640px; left: 140px; opacity: .5;}
  .frost.f4 { width: 14px; height: 14px; top: 560px; left: 60px; opacity: .7;}

  /* faixa de acento azul claro no encontro das duas áreas */
  .seam {
    position: absolute;
    top: 0;
    left: 60.5%;
    width: 8px;
    height: 100%;
    background: #9EEBFF;
    opacity: 0.55;
    transform: skewX(-14deg);
    z-index: 3;
  }

  /* ---------- lado esquerdo: produto ---------- */
  .logo {
    position: absolute;
    top: 56px;
    left: 96px;
    height: 92px;
    z-index: 4;
  }

  .foto-wrap {
    position: absolute;
    left: 40px;
    top: 130px;
    width: 1420px;
    height: 640px;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2;
  }

  .foto-wrap img {
    max-width: 100%;
    max-height: 100%;
    filter: drop-shadow(0 30px 24px rgba(0, 16, 51, 0.30));
  }

  .chao {
    position: absolute;
    left: 210px;
    top: 660px;
    width: 950px;
    height: 60px;
    background: radial-gradient(ellipse at center, rgba(0,16,51,0.22) 0%, rgba(0,16,51,0) 72%);
    z-index: 1;
  }

  .selo-frio {
    position: absolute;
    top: 150px;
    left: 1200px;
    width: 190px;
    height: 190px;
    border-radius: 50%;
    background: #001DA4;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    z-index: 5;
    box-shadow: 0 18px 30px rgba(0,16,51,0.25);
  }
  .selo-frio .linha1 {
    font-size: 22px;
    font-weight: 700;
    font-style: italic;
    color: #9EEBFF;
    letter-spacing: 1px;
  }
  .selo-frio .linha2 {
    font-size: 34px;
    font-weight: 800;
    font-style: italic;
    color: #F7CF00;
    line-height: 1.05;
    margin-top: 4px;
  }

  /* ---------- lado direito: texto ---------- */
  .right {
    position: absolute;
    top: 0;
    right: 0;
    width: 1090px;
    height: 100%;
    z-index: 4;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 96px 0 150px;
  }

  .marca {
    font-size: 28px;
    font-weight: 700;
    font-style: italic;
    color: #F7CF00;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 22px;
    opacity: 0.95;
  }

  .headline {
    font-size: 80px;
    font-weight: 800;
    font-style: italic;
    color: #FFFFFF;
    line-height: 1.06;
    letter-spacing: -1px;
    margin-bottom: 30px;
  }
  .headline .amarelo { color: #F7CF00; }

  .produto {
    font-size: 30px;
    font-weight: 600;
    color: #9EEBFF;
    margin-bottom: 6px;
  }

  .preco-linha {
    display: flex;
    align-items: baseline;
    gap: 18px;
    margin-bottom: 30px;
    flex-wrap: wrap;
  }

  .preco {
    font-size: 92px;
    font-weight: 800;
    font-style: italic;
    color: #F7CF00;
    line-height: 1;
  }

  .parcelas {
    font-size: 30px;
    font-weight: 600;
    color: #FFFFFF;
  }

  .beneficios {
    display: flex;
    gap: 44px;
    margin-bottom: 40px;
  }

  .beneficio {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .beneficio-icone {
    width: 40px;
    height: 40px;
    background: #F7CF00;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .beneficio-icone svg { width: 22px; height: 22px; fill: #001DA4; }

  .beneficio-texto {
    color: #FFFFFF;
    font-size: 26px;
    font-weight: 600;
  }

  .cta {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    background: #F7CF00;
    color: #001DA4;
    font-size: 32px;
    font-weight: 800;
    font-style: italic;
    padding: 22px 40px;
    border-radius: 12px;
    width: fit-content;
  }
</style>
</head>
<body>
<div class="banner">

  <img class="logo" src="file:///c:/Projetos%20Antigravity/Senhor%20Colchao/identidade/logo/logo-completa-trim.png" alt="Senhor Colchão">

  <div class="foto-wrap">

</html>
