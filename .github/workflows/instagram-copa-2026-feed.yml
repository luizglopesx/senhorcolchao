name: Instagram Feed — Aqui Dá Jogo! (Copa 2026)

on:
  schedule:
    - cron: '0 21 17 6 *'    # 17/06 às 18h BRT (21h UTC)
    - cron: '0 21 18 6 *'    # 18/06 às 18h BRT (21h UTC)
    - cron: '0 13 19 6 *'    # 19/06 às 10h BRT (13h UTC) — pré-jogo vs Haiti
    - cron: '0 21 21 6 *'    # 21/06 às 18h BRT (21h UTC)
    - cron: '0 21 23 6 *'    # 23/06 às 18h BRT (21h UTC)
    - cron: '0 13 24 6 *'    # 24/06 às 10h BRT (13h UTC) — pré-jogo vs Escócia
  workflow_dispatch:
    inputs:
      date_override:
        description: 'Forçar data (DD/MM, ex: 17/06) — deixe vazio para usar hoje'
        required: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publicar Feed no Instagram
        env:
          INSTAGRAM_PAGE_TOKEN: ${{ secrets.INSTAGRAM_PAGE_TOKEN }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
        run: |
          DATE_ARG="${{ github.event.inputs.date_override }}"
          if [ -n "$DATE_ARG" ]; then
            python3 .github/scripts/post_instagram_copa_feed.py "$DATE_ARG"
          else
            python3 .github/scripts/post_instagram_copa_feed.py
          fi
